name: Version Bump

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      prerelease:
        description: 'Pre-release identifier (optional, e.g., alpha, beta, rc)'
        required: false
        default: ''
        type: string

permissions:
  contents: write

jobs:
  bump-version:
    name: Bump Version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Get current version
        id: current
        run: |
          # Get latest tag or default to 0.0.0
          CURRENT=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          CURRENT=${CURRENT#v}
          echo "VERSION=$CURRENT" >> $GITHUB_OUTPUT
          echo "Current version: $CURRENT"

      - name: Calculate new version
        id: new
        run: |
          CURRENT="${{ steps.current.outputs.VERSION }}"
          BUMP="${{ inputs.bump_type }}"
          PRERELEASE="${{ inputs.prerelease }}"
          
          # Split version into parts
          IFS='.-' read -r MAJOR MINOR PATCH PRE <<< "$CURRENT"
          MAJOR=${MAJOR:-0}
          MINOR=${MINOR:-0}
          PATCH=${PATCH:-0}
          
          # Bump version
          case $BUMP in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac
          
          # Construct new version
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          if [ -n "$PRERELEASE" ]; then
            NEW_VERSION="$NEW_VERSION-$PRERELEASE"
          fi
          
          echo "VERSION=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"

      - name: Update version in source
        run: |
          NEW_VERSION="${{ steps.new.outputs.VERSION }}"
          
          # Update version in JLISwift.swift
          sed -i "s/version = \".*\"/version = \"$NEW_VERSION\"/" Sources/JLISwift/JLISwift.swift
          
          echo "Updated JLISwift.swift to version $NEW_VERSION"

      - name: Commit version bump
        run: |
          NEW_VERSION="${{ steps.new.outputs.VERSION }}"
          
          git add -A
          git commit -m "chore: bump version to $NEW_VERSION" || echo "No changes to commit"

      - name: Create and push tag
        run: |
          NEW_VERSION="${{ steps.new.outputs.VERSION }}"
          
          git tag -a "v$NEW_VERSION" -m "Release v$NEW_VERSION"
          git push origin main --follow-tags

      - name: Summary
        run: |
          echo "## Version Bump Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Previous version:** ${{ steps.current.outputs.VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **New version:** ${{ steps.new.outputs.VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Bump type:** ${{ inputs.bump_type }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The release workflow will now create a GitHub release automatically." >> $GITHUB_STEP_SUMMARY
